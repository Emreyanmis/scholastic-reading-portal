server:
  # Render (and most PaaS providers) inject the listen port via PORT.
  # Fall back to 8080 locally.
  port: ${PORT:8080}
  servlet:
    context-path: /
  forward-headers-strategy: native   # respect X-Forwarded-* from the platform's TLS terminator

spring:
  application:
    name: reading-portal

  datasource:
    # H2 in file mode — embeddable, zero-config, survives restarts.
    url: jdbc:h2:file:./data/portal;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  h2:
    console:
      enabled: false

portal:
  session:
    # 7 days. The session secret is REQUIRED in non-dev profiles; in dev we
    # fall back to a hard-coded value (see SessionService).
    max-age-seconds: 604800
    secret: ${PORTAL_SESSION_SECRET:dev-only-insecure-secret}
  cookie:
    # Set to true in production so the session cookie is sent only over HTTPS.
    # Render serves over HTTPS so this should be true on Render.
    secure: ${PORTAL_COOKIE_SECURE:false}
    # "None" is required if the frontend is on a different eTLD+1 than the
    # backend (e.g. Vercel frontend + Render backend) because cookies have to
    # cross sites. "None" also requires Secure=true (HTTPS), which Render provides.
    same-site: ${PORTAL_COOKIE_SAMESITE:Lax}
  cors:
    # Comma-separated origins allowed to send cookies. The Vite proxy forwards
    # the browser's Origin header to the backend, so any host the dev frontend
    # is reached at (localhost / 127.0.0.1, dev / preview port) needs to be
    # listed. Add the deployed origin via PORTAL_CORS_ORIGINS in production.
    allowed-origins: ${PORTAL_CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}

logging:
  level:
    org.springframework: INFO
    org.hibernate.SQL: WARN
    com.scholastic.portal: INFO
